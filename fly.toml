# fly.toml app configuration file generated for heigo-league-db on 2026-03-04T17:21:53+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'heigo-league-db'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[[mounts]]
  source = 'heigo_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  
  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
  
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[http_service.http_options]
  compress = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
