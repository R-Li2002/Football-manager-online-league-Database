name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /srv/heigo

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r bot_nonebot/requirements.txt

      - name: Run pre-release checks
        shell: pwsh
        run: ./scripts/pre-release-check.ps1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu
            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f docker-compose.yml -f docker-compose.bot.yml up -d --build --remove-orphans

            for attempt in $(seq 1 20); do
              if docker compose -f docker-compose.yml -f docker-compose.bot.yml exec -T heigo python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()" >/dev/null 2>&1 \
                && docker compose -f docker-compose.yml -f docker-compose.bot.yml exec -T bot-nonebot python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()" >/dev/null 2>&1; then
                docker compose -f docker-compose.yml -f docker-compose.bot.yml ps
                exit 0
              fi
              sleep 3
            done

            docker compose -f docker-compose.yml -f docker-compose.bot.yml logs --tail=200 heigo
            docker compose -f docker-compose.yml -f docker-compose.bot.yml logs --tail=200 bot-nonebot
            exit 1
